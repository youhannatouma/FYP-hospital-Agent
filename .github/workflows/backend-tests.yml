name: Backend Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    name: Dependency Vulnerability Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pip-audit safety bandit

      - name: Run pip-audit (PYPA vulnerability database)
        id: pip_audit
        continue-on-error: true
        run: |
          echo "Running pip-audit security check..."
          pip-audit --desc --skip-editable || EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Run safety (Security vulnerabilities database)
        id: safety
        continue-on-error: true
        run: |
          echo "Running safety security check..."
          safety check --json || EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Run bandit (Security code analysis)
        id: bandit
        continue-on-error: true
        run: |
          echo "Running bandit security scan..."
          bandit -r backend/app -f json -o bandit-report.json || EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Display summary
          bandit -r backend/app || true

      - name: Fail if critical vulnerabilities found
        if: steps.pip_audit.outputs.exit_code == '1' || steps.safety.outputs.exit_code != '0'
        run: |
          echo "🚨 Critical security vulnerabilities found!"
          echo "Please review and update vulnerable dependencies"
          exit 1

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
          retention-days: 30

  fast-contract-auth:
    needs: [dependency-security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run fast supervisor/contract tests
        env:
          GOOGLE_API_KEY: test-key
        run: |
          python -m pytest -q \
            backend/tests/test_supervisor_sse_api_contract.py \
            backend/tests/test_supervisor_endpoint_authorization.py \
            backend/tests/test_supervisor_main_dispatch.py \
            backend/tests/test_supervisor_graph_order.py \
            backend/tests/test_supervisor_doctor_resolution.py \
            backend/tests/test_supervisor_conditional_gate.py \
            backend/tests/test_telemetry_events.py

  db-slot-race:
    needs: [dependency-security]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: FYP
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234567890
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d FYP"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:1234567890@localhost:5432/FYP
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: FYP
      DB_USER: postgres
      DB_PASSWORD: 1234567890
      RUN_DB_SLOT_RACE_TEST: "1"
      GOOGLE_API_KEY: test-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Wait for postgres service
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres -d FYP; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Bootstrap base schema tables
        run: |
          python backend/scripts/db_bootstrap_schema.py

      - name: Apply DB phase migrations
        run: |
          python backend/scripts/db_apply_migrations.py

      - name: Run DB-backed slot race integration
        run: |
          python -m pytest -q backend/tests/test_slot_race_integration.py

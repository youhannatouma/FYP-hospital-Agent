name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Frontend (TypeScript/Next.js) checks
  frontend-checks:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./care
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint
      
      - name: Build Next.js app
        run: npm run build
      
      - name: Run tests (if available)
        run: npm run test --if-present
        continue-on-error: true

  # Python backend checks (if applicable)
  python-checks:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest
        continue-on-error: true
      
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-code is 0 even if there are warnings on exit
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Format check with black
        run: black --check . --diff
        continue-on-error: true
      
      - name: Run Python tests
        run: pytest
        continue-on-error: true

  # Database schema validation (PostgreSQL)
  database-checks:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate SQL syntax
        run: |
          # Basic SQL syntax validation using psql
          psql postgresql://postgres:postgres@localhost:5432/test_db < "SQL queries.pgsql" || echo "SQL validation completed"
        continue-on-error: true

  # Code quality summary
  quality-gate:
    runs-on: ubuntu-latest
    needs: [frontend-checks, python-checks, database-checks]
    if: always()
    
    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.frontend-checks.result }}" = "failure" ] || \
             [ "${{ needs.python-checks.result }}" = "failure" ] || \
             [ "${{ needs.database-checks.result }}" = "failure" ]; then
            echo "❌ Some checks failed"
            exit 1
          else
            echo "✅ All checks passed"
          fi
